# Nginx reverse proxy example for Token-Tracker.
# Suggested DNS:
#   token-tracker.dev      -> this server
#   www.token-tracker.dev  -> this server
#   api.token-tracker.dev  -> this server (optional clean proxy hostname)

server {
    listen 80;
    server_name token-tracker.dev www.token-tracker.dev api.token-tracker.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name token-tracker.dev www.token-tracker.dev api.token-tracker.dev;

    # Fill these with certbot/Let's Encrypt paths after issuing certs.
    ssl_certificate /etc/letsencrypt/live/token-tracker.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/token-tracker.dev/privkey.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
