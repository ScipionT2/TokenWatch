services:
  tokenwatch:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${TOKENWATCH_DOCKER_DATABASE_URL:-sqlite+aiosqlite:////app/data/tokenwatch.db}
    volumes:
      - tokenwatch-data:/app/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  tokenwatch-data:
